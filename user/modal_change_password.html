<!-- MODAL GANTI PASSWORD -->
<div id="modal-change-password" class="fixed inset-0 z-[9999] items-center justify-center p-4" style="display:none">
    <div id="mcp-backdrop" class="absolute inset-0 bg-black/60 backdrop-blur-sm opacity-0 transition-opacity duration-300"></div>
    <div id="mcp-box" class="relative bg-white rounded-2xl shadow-2xl w-full max-w-md opacity-0 scale-95 transition-all duration-300 overflow-hidden">
        <div class="bg-gradient-to-r from-orange-500 to-orange-600 px-6 py-5 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl bg-white/20 flex items-center justify-center"><i class="fas fa-key text-white"></i></div>
                <div><h3 class="text-white font-bold text-base">Ganti Password</h3><p class="text-orange-100 text-xs">Pastikan password kuat &amp; mudah diingat</p></div>
            </div>
            <button id="mcp-close" class="w-8 h-8 rounded-lg bg-white/20 hover:bg-white/30 flex items-center justify-center text-white"><i class="fas fa-times text-sm"></i></button>
        </div>
        <div class="px-6 py-5 space-y-4">
            <div id="mcp-alert" class="hidden rounded-xl px-4 py-3 text-sm flex items-start gap-3"></div>
            <div>
                <label class="block text-xs font-semibold text-gray-600 mb-1.5">Password Saat Ini</label>
                <div class="relative">
                    <input type="password" id="mcp-current" placeholder="Masukkan password saat ini" class="w-full px-4 py-2.5 pr-10 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-orange-400 bg-gray-50 focus:bg-white transition-all">
                    <button type="button" class="mcp-eye absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600" data-target="mcp-current"><i class="fas fa-eye text-sm"></i></button>
                </div>
            </div>
            <div>
                <label class="block text-xs font-semibold text-gray-600 mb-1.5">Password Baru</label>
                <div class="relative">
                    <input type="password" id="mcp-new" placeholder="Minimal 6 karakter" class="w-full px-4 py-2.5 pr-10 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-orange-400 bg-gray-50 focus:bg-white transition-all">
                    <button type="button" class="mcp-eye absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600" data-target="mcp-new"><i class="fas fa-eye text-sm"></i></button>
                </div>
                <div class="mt-2">
                    <div class="flex gap-1 mb-1">
                        <div class="mcp-bar h-1 flex-1 rounded-full bg-gray-200 transition-all duration-300"></div>
                        <div class="mcp-bar h-1 flex-1 rounded-full bg-gray-200 transition-all duration-300"></div>
                        <div class="mcp-bar h-1 flex-1 rounded-full bg-gray-200 transition-all duration-300"></div>
                        <div class="mcp-bar h-1 flex-1 rounded-full bg-gray-200 transition-all duration-300"></div>
                    </div>
                    <p id="mcp-strength-label" class="text-[11px] text-gray-400"></p>
                </div>
            </div>
            <div>
                <label class="block text-xs font-semibold text-gray-600 mb-1.5">Konfirmasi Password Baru</label>
                <div class="relative">
                    <input type="password" id="mcp-confirm" placeholder="Ulangi password baru" class="w-full px-4 py-2.5 pr-10 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-orange-400 bg-gray-50 focus:bg-white transition-all">
                    <button type="button" class="mcp-eye absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600" data-target="mcp-confirm"><i class="fas fa-eye text-sm"></i></button>
                </div>
                <p id="mcp-match-label" class="text-[11px] mt-1"></p>
            </div>
        </div>
        <div class="px-6 pb-6 flex gap-3">
            <button id="mcp-cancel" class="flex-1 py-2.5 rounded-xl border border-gray-200 text-sm font-semibold text-gray-600 hover:bg-gray-50 transition-all">Batal</button>
            <button id="mcp-submit" class="flex-1 py-2.5 rounded-xl bg-gradient-to-r from-orange-500 to-orange-600 text-white text-sm font-semibold hover:from-orange-600 hover:to-orange-700 transition-all shadow-md flex items-center justify-center gap-2"><i class="fas fa-save"></i> Simpan</button>
        </div>
    </div>
</div>
<script>
(function(){
    var API='<?php echo app_abs_path("user/change_password.php"); ?>';
    var modal=document.getElementById('modal-change-password'),
        backdrop=document.getElementById('mcp-backdrop'),
        box=document.getElementById('mcp-box'),
        alertEl=document.getElementById('mcp-alert'),
        btnOpen=document.getElementById('btn-open-change-password'),
        btnClose=document.getElementById('mcp-close'),
        btnCancel=document.getElementById('mcp-cancel'),
        btnSubmit=document.getElementById('mcp-submit'),
        inpCur=document.getElementById('mcp-current'),
        inpNew=document.getElementById('mcp-new'),
        inpCon=document.getElementById('mcp-confirm'),
        bars=document.querySelectorAll('.mcp-bar'),
        strLbl=document.getElementById('mcp-strength-label'),
        matLbl=document.getElementById('mcp-match-label');
    if(!modal||!btnOpen)return;
    function openModal(){
        modal.style.display='flex';
        setTimeout(function(){backdrop.style.opacity='1';box.style.transform='scale(1)';box.style.opacity='1';},10);
        resetForm();
        setTimeout(function(){inpCur.focus();},300);
    }
    function closeModal(){
        backdrop.style.opacity='0';box.style.transform='scale(0.95)';box.style.opacity='0';
        setTimeout(function(){modal.style.display='none';},280);
    }
    btnOpen.addEventListener('click',openModal);
    btnClose.addEventListener('click',closeModal);
    btnCancel.addEventListener('click',closeModal);
    backdrop.addEventListener('click',closeModal);
    document.addEventListener('keydown',function(e){if(e.key==='Escape')closeModal();});
    document.querySelectorAll('.mcp-eye').forEach(function(btn){
        btn.addEventListener('click',function(){
            var inp=document.getElementById(btn.getAttribute('data-target')),icon=btn.querySelector('i');
            if(inp.type==='password'){inp.type='text';icon.classList.replace('fa-eye','fa-eye-slash');}
            else{inp.type='password';icon.classList.replace('fa-eye-slash','fa-eye');}
        });
    });
    var strInfo=[
        {label:'',colors:[]},
        {label:'Sangat lemah',colors:['bg-red-500']},
        {label:'Lemah',colors:['bg-red-400','bg-red-400']},
        {label:'Cukup kuat',colors:['bg-yellow-400','bg-yellow-400','bg-yellow-400']},
        {label:'Kuat',colors:['bg-green-500','bg-green-500','bg-green-500','bg-green-500']}
    ];
    function calcStr(pw){
        if(!pw||pw.length<1)return 0;
        var s=0;
        if(pw.length>=6)s++;if(pw.length>=10)s++;
        if(/[A-Z]/.test(pw)&&/[a-z]/.test(pw))s++;
        if(/[^A-Za-z0-9]/.test(pw)||/\d/.test(pw))s++;
        return Math.min(4,s);
    }
    inpNew.addEventListener('input',function(){
        var s=calcStr(inpNew.value),info=strInfo[s];
        bars.forEach(function(b,i){b.className='mcp-bar h-1 flex-1 rounded-full transition-all duration-300 '+(info.colors[i]||'bg-gray-200');});
        strLbl.textContent=info.label;
        strLbl.className='text-[11px] '+(s<=2?'text-red-400':s===3?'text-yellow-500':'text-green-600');
        checkMatch();
    });
    inpCon.addEventListener('input',checkMatch);
    function checkMatch(){
        if(!inpCon.value){matLbl.textContent='';return;}
        if(inpNew.value===inpCon.value){matLbl.textContent='Password cocok';matLbl.className='text-[11px] mt-1 text-green-600';}
        else{matLbl.textContent='Tidak cocok';matLbl.className='text-[11px] mt-1 text-red-500';}
    }
    function showAlert(msg,isErr){
        alertEl.className='rounded-xl px-4 py-3 text-sm flex items-start gap-3 '+(isErr?'bg-red-50 text-red-700 border border-red-200':'bg-green-50 text-green-700 border border-green-200');
        alertEl.innerHTML='<i class="fas '+(isErr?'fa-exclamation-circle':'fa-check-circle')+' mt-0.5 flex-shrink-0"></i><span>'+msg+'</span>';
        alertEl.classList.remove('hidden');
    }
    function resetForm(){
        [inpCur,inpNew,inpCon].forEach(function(el){el.value='';el.type='password';});
        document.querySelectorAll('.mcp-eye i').forEach(function(i){i.classList.replace('fa-eye-slash','fa-eye');});
        bars.forEach(function(b){b.className='mcp-bar h-1 flex-1 rounded-full bg-gray-200 transition-all duration-300';});
        strLbl.textContent='';matLbl.textContent='';
        alertEl.classList.add('hidden');
        btnSubmit.disabled=false;
        btnSubmit.innerHTML='<i class="fas fa-save"></i> Simpan';
    }
    btnSubmit.addEventListener('click',function(){
        var cur=inpCur.value.trim(),nw=inpNew.value,cf=inpCon.value;
        if(!cur||!nw||!cf){showAlert('Semua field wajib diisi.',true);return;}
        if(nw.length<6){showAlert('Password baru minimal 6 karakter.',true);return;}
        if(nw!==cf){showAlert('Password baru dan konfirmasi tidak cocok.',true);return;}
        btnSubmit.disabled=true;
        btnSubmit.innerHTML='<i class="fas fa-spinner fa-spin"></i> Menyimpan...';
        alertEl.classList.add('hidden');
        var fd=new FormData();
        fd.append('current_password',cur);
        fd.append('new_password',nw);
        fd.append('confirm_password',cf);
        fetch(API,{method:'POST',body:fd})
            .then(function(r){return r.json();})
            .then(function(d){
                if(d.success){
                    showAlert(d.message||'Password berhasil diubah!',false);
                    btnSubmit.innerHTML='<i class="fas fa-check"></i> Berhasil';
                    setTimeout(closeModal,1800);
                }else{
                    showAlert(d.message||'Terjadi kesalahan.',true);
                    btnSubmit.disabled=false;
                    btnSubmit.innerHTML='<i class="fas fa-save"></i> Simpan';
                }
            })
            .catch(function(){
                showAlert('Gagal terhubung ke server.',true);
                btnSubmit.disabled=false;
                btnSubmit.innerHTML='<i class="fas fa-save"></i> Simpan';
            });
    });
    [inpCur,inpNew,inpCon].forEach(function(el){
        el.addEventListener('keydown',function(e){if(e.key==='Enter')btnSubmit.click();});
    });
})();
</script>
